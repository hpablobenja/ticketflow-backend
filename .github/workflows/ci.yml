name: TicketFlow CI Pipeline 🎫

# El pipeline se ejecutará automáticamente ante cualquier Push o Pull Request a la rama main
on:
  push:
    branches: 
      - '**'
  pull_request:
    branches: 
      - '**'

jobs:
  code-quality:
    name: 🧪 Calidad de Código y Linters
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar el Repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Optimiza el tiempo del pipeline guardando las librerías en caché

    - name: 📦 Instalar Dependencias de Desarrollo
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 pytest httpx

    - name: 🎨 Verificar Formato con Black
      run: |
        # Verifica si el código cumple con las reglas estéticas sin modificar los archivos
        black --check .

    - name: 🔍 Análisis Estático con Flake8
      run: |
        # Detiene el pipeline si hay errores de sintaxis o código inalcanzable
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  unit-tests:
    name: 🚦 Ejecución de Tests Automatizados
    runs-on: ubuntu-latest
    needs: code-quality # No corre los tests si los linters fallaron primero
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: 📥 Clonar el Repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        if [ -f auth-service/requirements.txt ]; then pip install -r auth-service/requirements.txt; fi
        if [ -f booking-service/requirements.txt ]; then pip install -r booking-service/requirements.txt; fi
        pip install pytest httpx pytest-asyncio

    - name: 🏃‍♂️ Ejecutar Suite de Tests con Pytest
      env:
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        REDIS_HOST: localhost
      run: |
        pytest